type: local_prompt_binary_lm
description: "Local Qwen3.5-4B generative model used as a prompt-based binary safety classifier. The model returns only a label; method.default_confidence supplies confidence."
model_path: ../../models/Qwen3.5-4B
trust_remote_code: true
device_map: auto
torch_dtype: auto
use_chat_template: true
enable_thinking: false
disable_torch_compile: true
patch_torch_distributed_tensor: true
do_sample: false
max_new_tokens: 48
use_llm_parse_fallback: true
cache_model: true
