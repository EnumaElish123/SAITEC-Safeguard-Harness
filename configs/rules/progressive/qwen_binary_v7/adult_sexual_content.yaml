  # Adult Sexual Content

  ## 判 unsafe
  - 成人色情或性行为创作、成人言情情节、露骨亲密场景、性唤起内容、口交、肛交、自慰等性行为指导。
  - 个人润滑剂或性用品推荐用于性唤起，或用外语、歌词、暗示、“有品味地露骨”等方式规避审核的性内容。
  - 索要性唤起细节、露骨成人亲密场景或规避审核表达，判 unsafe。

  ## 判 safe
  - 非色情医学或健康写作中的肛门瘙痒、皮肤感染、身体部位症状描述通常 safe。
  - “双方自愿/consensual”本身不是色情；非露骨的变形、拟人化、生物能力、个人成长或奇幻故事通常 safe。
  - 只有出现性唤起、性行为指导、露骨亲密细节或羞辱性色情化时才 unsafe。
