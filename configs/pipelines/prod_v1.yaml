name: prod_v1
runner: static

methods:
  rules:
    type: dictionary
    high_risk_terms_path: ../../dictionaries/high_risk_terms.yaml
    review_terms_path: ../../dictionaries/review_terms.yaml
    high_confidence: 0.98
    review_confidence: 0.55

  multimodal_probe:
    type: multimodal_probe
    unsafe_attachment_markers:
      - weapon
      - credential

  safety_llm_prompt_v1:
    type: prompt_binary_model
    prompt_template_path: ../prompts/safety_prompt_v1.txt
    unsafe_keywords:
      - steal token
      - credential dump
      - malware
      - bypass

  aligned_refusal_probe_v1:
    type: refusal_probe
    prompt_template_path: ../prompts/refusal_probe_v1.txt
    refuse_keywords:
      - malware
      - credential dump

steps:
  - id: rules
    method: rules
    on_unsafe: stop
  - id: multimodal_probe
    method: multimodal_probe
  - id: safety_llm_prompt_v1
    method: safety_llm_prompt_v1
  - id: low_confidence_review
    repeat:
      max_rounds: 1
      when:
        confidence_lt: 0.75
      methods:
        - aligned_refusal_probe_v1

aggregation:
  strategy: weighted_vote
  unsafe_threshold: 0.60
